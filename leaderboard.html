<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HALL OF FAME | Data Mastery Externado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --externado-orange: #EC7E41;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin:0; padding:0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Background Mesh Gradient (Consistent with Game) */
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(236, 126, 65, 0.05) 0%, transparent 60%);
            z-index: -1;
            animation: moveGradient 15s infinite alternate;
        }

        @keyframes moveGradient {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .dashboard-container {
            width: 90%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 60px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header { margin-bottom: 50px; position: relative; }
        .header h1 {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: -3px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            text-transform: uppercase;
            margin-bottom: 0;
        }
        .header p { 
            color: var(--externado-orange); 
            font-size: 18px; 
            font-weight: 700;
            letter-spacing: 6px; 
            margin-top: 5px; 
            opacity: 0.8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 24px;
        }

        thead tr {
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th { 
            text-align: left; 
            padding: 20px; 
            font-weight: 300; 
            color: var(--externado-orange); 
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
        }

        td { padding: 25px 20px; font-weight: 400; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .rank { font-weight: 900; color: rgba(255,255,255,0.2); width: 80px; }
        .name { color: #fff; text-align: left; }
        .time { color: var(--neon-blue); font-family: monospace; text-align: right; }

        .top-1 { background: rgba(236, 126, 65, 0.1); border-radius: 15px; }
        .top-1 .rank { color: var(--externado-orange); }
        .top-1 .name { font-weight: 700; color: #fff; }

        .new-entry { animation: highlight 2s ease-out; }
        @keyframes highlight {
            0% { background: rgba(0, 210, 255, 0.3); }
            100% { background: transparent; }
        }

        #empty-msg { padding: 40px; color: rgba(255,255,255,0.2); font-style: italic; }

        #data-canvas {
            position: fixed; top: 0; left: 0; pointer-events: none; z-index: -1; opacity: 0.15;
        }

        /* Admin Button */
        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 0, 0, 0.1);
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 0, 0, 0.2);
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            z-index: 100;
        }
        .admin-btn.close-group {
            right: 150px;
            background: rgba(236, 126, 65, 0.1);
            color: var(--externado-orange);
            border-color: rgba(236, 126, 65, 0.3);
        }
        .admin-btn.close-group:hover {
            background: var(--externado-orange);
            color: #fff;
            box-shadow: 0 0 15px rgba(236, 126, 65, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="data-canvas"></canvas>
    <button class="admin-btn close-group" onclick="closeGroup()">Cerrar Grupo (Exportar + Limpiar)</button>
    <button class="admin-btn" onclick="clearLeaderboard()">Borrar Todo (Admin)</button>

    <div class="dashboard-container">
        <div class="header">
            <h1>Hall of Fame</h1>
            <p>DATA MASTERY | EXTERNADO FEST</p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Aspirante</th>
                    <th style="text-align: right;">Tiempo Final</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <!-- Data will injected here -->
            </tbody>
        </table>
        <div id="empty-msg" style="display:none;">Esperando a los primeros expertos...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const supabaseUrl = 'https://ddoiufkgisillaovdmty.supabase.co';
        const supabaseKey = 'sb_publishable_jQ2b3eR3nxzijAb5D9Sqbw_npwcqW-p';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);


        async function fetchLeaderboard() {
            const { data, error } = await _supabase
                .from('leaderboard')
                .select('*')
                .order('time_seconds', { ascending: true })
                .limit(10);

            if (data) {
                renderLeaderboard(data);
            }
        }

        async function closeGroup() {
            if (!confirm("📂 ¿Deseas CERRAR EL GRUPO? Se descargará un Excel con los resultados y el tablero se vaciará para el siguiente grupo.")) return;

            // 1. Fetch ALL data (not just top 10)
            const { data, error } = await _supabase
                .from('leaderboard')
                .select('*')
                .order('time_seconds', { ascending: true });

            if (error || !data || data.length === 0) {
                alert("No hay datos para exportar.");
                return;
            }

            // 2. Generate CSV
            const headers = ["ID", "Participante", "Tiempo (seg)", "Fecha"];
            const rows = data.map(r => [r.id, r.name, r.time_seconds, r.created_at]);
            
            let csvContent = "data:text/csv;charset=utf-8," 
                + headers.join(",") + "\n"
                + rows.map(e => e.join(",")).join("\n");

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Externado_Fest_Grupo_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // 3. Clear Database
            const { error: delError } = await _supabase
                .from('leaderboard')
                .delete()
                .neq('id', 0);

            if (!delError) {
                alert("✅ Grupo cerrado y Excel descargado exitosamente.");
                fetchLeaderboard();
            }
        }

        async function clearLeaderboard() {
            if (!confirm("⚠️ ¿ESTÁS SEGURO? Esto borrará TODOS los registros de la base de datos definitivamente.")) return;
            
            const { error } = await _supabase
                .from('leaderboard')
                .delete()
                .neq('id', 0); // Hack to delete all rows

            if (error) {
                alert("Error al borrar: " + error.message);
            } else {
                alert("Base de datos limpiada correctamente.");
                fetchLeaderboard();
            }
        }

        function renderLeaderboard(data) {
            const body = document.getElementById('leaderboard-body');
            const empty = document.getElementById('empty-msg');
            
            if (data.length === 0) {
                empty.style.display = 'block';
                body.innerHTML = '';
                return;
            }

            empty.style.display = 'none';
            body.innerHTML = data.map((row, index) => `
                <tr class="${index === 0 ? 'top-1' : ''}" id="row-${row.id}">
                    <td class="rank">#${index + 1}</td>
                    <td class="name">${row.name.toUpperCase()}</td>
                    <td class="time">${row.time_seconds.toFixed(2)}s</td>
                </tr>
            `).join('');
        }

        // Real-time Subscription
        _supabase
            .channel('public:leaderboard')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'leaderboard' }, payload => {
                console.log('¡Nuevo registro detectado!', payload);
                fetchLeaderboard();
            })
            .subscribe();

        // Data Rain Effect
        const canvas = document.getElementById('data-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, columns, drops;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / 20);
            drops = new Array(columns).fill(1);
        }

        function drawRain() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#00d2ff';
            ctx.font = '15px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = Math.random() > 0.5 ? '0' : '1';
                ctx.fillText(text, i * 20, drops[i] * 20);
                if (drops[i] * 20 > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        window.addEventListener('resize', resize);
        resize();
        setInterval(drawRain, 50);

        // Initial Load
        fetchLeaderboard();
    </script>
</body>
</html>
