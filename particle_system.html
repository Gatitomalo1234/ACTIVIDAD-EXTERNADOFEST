<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Particle System — Ultra Premium | Externado Fest</title>
  <meta name="description"
    content="Interactive 3D particle system with bloom, audio reactivity, and hand gesture control.">

  <!-- Three.js Core (r128) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

  <!-- Three.js Post-Processing (Bloom) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      color: #fff;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    canvas#three-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ---- Ultra-Premium UI Panel ---- */
    #ui-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      width: 270px;
      background: rgba(8, 8, 18, 0.55);
      backdrop-filter: blur(30px) saturate(1.8);
      -webkit-backdrop-filter: blur(30px) saturate(1.8);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 22px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      box-shadow:
        0 0 0 0.5px rgba(255, 255, 255, 0.04) inset,
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 0 80px rgba(120, 80, 255, 0.03);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      scrollbar-width: none;
    }

    #ui-panel::-webkit-scrollbar {
      display: none;
    }

    #ui-panel h1 {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #c084fc, #38bdf8, #34d399);
      background-size: 200% 200%;
      animation: gradientShift 6s ease infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .section-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.25);
      margin-bottom: 6px;
    }

    /* Shape buttons (2x2 grid) */
    .shapes-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .shape-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 10px 6px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-family: inherit;
    }

    .shape-btn .shape-icon {
      font-size: 20px;
      filter: grayscale(0.3);
      transition: filter 0.3s;
    }

    .shape-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(192, 132, 252, 0.3);
      transform: translateY(-2px);
      color: #fff;
    }

    .shape-btn:hover .shape-icon {
      filter: grayscale(0);
    }

    .shape-btn.active {
      background: linear-gradient(135deg, rgba(192, 132, 252, 0.15), rgba(56, 189, 248, 0.1));
      border-color: rgba(192, 132, 252, 0.5);
      color: #fff;
      box-shadow: 0 0 20px rgba(192, 132, 252, 0.1), inset 0 0 20px rgba(192, 132, 252, 0.05);
    }

    .shape-btn.active .shape-icon {
      filter: grayscale(0);
    }

    /* Color picker row */
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-row label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      flex: 1;
    }

    input[type="color"] {
      -webkit-appearance: none;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 2px;
    }

    input[type="color"]::-webkit-color-swatch {
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
    }

    /* Audio section */
    .audio-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .audio-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #audio-toggle-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 5px 10px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: inherit;
    }

    #audio-toggle-btn:hover {
      background: rgba(192, 132, 252, 0.15);
      border-color: rgba(192, 132, 252, 0.4);
      color: #fff;
    }

    #audio-toggle-btn.active {
      background: rgba(52, 211, 153, 0.15);
      border-color: rgba(52, 211, 153, 0.4);
      color: #34d399;
    }

    #audio-bars {
      display: flex;
      gap: 2px;
      height: 28px;
      align-items: flex-end;
      padding: 4px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .audio-bar {
      flex: 1;
      background: linear-gradient(to top, #7c3aed, #c084fc, #38bdf8);
      border-radius: 2px;
      min-height: 2px;
      transition: height 0.08s ease-out;
      opacity: 0.3;
    }

    #audio-bars.active .audio-bar {
      opacity: 1;
    }

    /* Gesture status */
    #gesture-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    #gesture-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #333;
      transition: all 0.3s;
      flex-shrink: 0;
    }

    #gesture-dot.open {
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80, 0 0 20px rgba(74, 222, 128, 0.3);
    }

    #gesture-dot.closed {
      background: #f97316;
      box-shadow: 0 0 8px #f97316;
    }

    /* Webcam preview */
    #cam-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: #030308;
    }

    #cam-off-message {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.85);
      z-index: 5;
    }

    #cam-wrapper.off #cam-off-message {
      display: flex;
    }

    #cam-wrapper video,
    #cam-wrapper canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #cam-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    #cam-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      font-size: 8px;
      font-weight: 700;
      background: rgba(239, 68, 68, 0.7);
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 1px;
      color: #fff;
      z-index: 10;
      animation: livePulse 2s ease infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    #cam-toggle-btn {
      position: absolute;
      bottom: 6px;
      right: 6px;
      font-size: 10px;
      font-weight: 600;
      background: rgba(192, 132, 252, 0.2);
      border: 1px solid rgba(192, 132, 252, 0.4);
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      color: #fff;
      backdrop-filter: blur(4px);
      z-index: 10;
      transition: all 0.2s;
      font-family: inherit;
    }

    #cam-toggle-btn:hover {
      background: rgba(192, 132, 252, 0.4);
    }

    /* Action buttons */
    .action-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      padding: 10px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
      width: 100%;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      transform: translateY(-1px);
    }

    .actions-row {
      display: flex;
      gap: 6px;
    }

    .actions-row .action-btn {
      flex: 1;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
      margin: 2px 0;
    }

    /* Toggle panel btn (mobile) */
    #toggle-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 101;
      background: rgba(8, 8, 18, 0.6);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      width: 40px;
      height: 40px;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      #toggle-panel {
        display: flex;
      }

      #ui-panel {
        transform: translateX(-320px);
      }

      #ui-panel.visible {
        transform: translateX(0);
      }
    }

    /* FPS Badge */
    #fps-badge {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.2);
      z-index: 50;
      font-family: 'Inter', monospace;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>

  <div id="canvas-container">
    <canvas id="three-canvas"></canvas>
  </div>

  <div id="fps-badge">-- FPS</div>

  <button id="toggle-panel" aria-label="Toggle panel">☰</button>

  <div id="ui-panel" class="visible">
    <h1>✦ Particle System Ultra</h1>

    <div>
      <div class="section-label">Shape</div>
      <div class="shapes-grid">
        <button class="shape-btn" data-shape="logo">
          <span class="shape-icon">🧠</span> Logo
        </button>
        <button class="shape-btn active" data-shape="cloud">
          <span class="shape-icon">☁️</span> Cloud
        </button>
        <button class="shape-btn" data-shape="galaxy">
          <span class="shape-icon">🌀</span> Galaxy
        </button>
        <button class="shape-btn" data-shape="welcome">
          <span class="shape-icon">✌️</span> Welcome
        </button>
      </div>
    </div>

    <div>
      <div class="section-label">Color</div>
      <div class="color-row">
        <label>Particle Color</label>
        <input type="color" id="color-picker" value="#c084fc">
      </div>
    </div>

    <div class="divider"></div>

    <div class="audio-section">
      <div class="audio-header">
        <div class="section-label" style="margin-bottom: 0;">Audio Reactive</div>
        <button id="audio-toggle-btn">🎤 Activar</button>
      </div>
      <div id="audio-bars">
        <div class="audio-bar"></div><div class="audio-bar"></div><div class="audio-bar"></div>
        <div class="audio-bar"></div><div class="audio-bar"></div><div class="audio-bar"></div>
        <div class="audio-bar"></div><div class="audio-bar"></div><div class="audio-bar"></div>
        <div class="audio-bar"></div><div class="audio-bar"></div><div class="audio-bar"></div>
        <div class="audio-bar"></div><div class="audio-bar"></div><div class="audio-bar"></div>
        <div class="audio-bar"></div>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">Camera</div>
      <div id="cam-wrapper">
        <video id="cam-video" playsinline></video>
        <canvas id="cam-overlay"></canvas>
        <div id="cam-badge">LIVE</div>
        <div id="cam-off-message">Cámara Desactivada<br><span style="font-size: 9px; opacity: 0.5;">(Tracking
            pausado)</span></div>
        <button id="cam-toggle-btn">Apagar Cámara</button>
      </div>
    </div>

    <div>
      <div class="section-label">Gesture</div>
      <div id="gesture-status">
        <span id="gesture-dot"></span>
        <span id="gesture-text">Waiting for hand…</span>
      </div>
    </div>

    <div class="actions-row">
      <button class="action-btn" id="rotate-toggle-btn">⏸ Pausar</button>
      <button class="action-btn" id="fullscreen-btn">⛶ Fullscreen</button>
    </div>
  </div>

  <script>
    // ========== CONFIG ==========
    const PARTICLE_COUNT = 18000;
    const LERP_SPEED = 0.04;
    let autoRotate = true;

    // ========== THREE.JS SETUP ==========
    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    const scene = new THREE.Scene();
    const camera3D = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera3D.position.z = 5;

    // ========== POST-PROCESSING (BLOOM) ==========
    let composer = null;
    let bloomPass = null;

    function setupBloom() {
      try {
        if (typeof THREE.EffectComposer === 'undefined') {
          console.warn('Bloom not available — using fallback rendering');
          return;
        }

        composer = new THREE.EffectComposer(renderer);
        const renderPass = new THREE.RenderPass(scene, camera3D);
        composer.addPass(renderPass);

        bloomPass = new THREE.UnrealBloomPass(
          new THREE.Vector2(window.innerWidth, window.innerHeight),
          1.6,  // strength
          0.7,  // radius
          0.05  // threshold (low = everything glows)
        );
        composer.addPass(bloomPass);

        console.log('✨ UnrealBloomPass initialized');
      } catch (e) {
        console.warn('Bloom setup failed, using fallback:', e);
        composer = null;
      }
    }
    setupBloom();

    // ========== PARTICLE TEXTURE (Enhanced Glow) ==========
    function createCircleTexture() {
      const size = 128;
      const tCanvas = document.createElement('canvas');
      tCanvas.width = size; tCanvas.height = size;
      const tCtx = tCanvas.getContext('2d');
      const center = size / 2;
      const radius = size / 2 - 2;

      // Layered glow: hot core → soft halo
      const grad = tCtx.createRadialGradient(center, center, 0, center, center, radius);
      grad.addColorStop(0, 'rgba(255,255,255,1)');
      grad.addColorStop(0.12, 'rgba(255,255,255,0.95)');
      grad.addColorStop(0.3, 'rgba(255,255,255,0.5)');
      grad.addColorStop(0.55, 'rgba(255,255,255,0.12)');
      grad.addColorStop(0.8, 'rgba(255,255,255,0.02)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');

      tCtx.fillStyle = grad;
      tCtx.beginPath();
      tCtx.arc(center, center, radius, 0, Math.PI * 2);
      tCtx.fill();
      return new THREE.CanvasTexture(tCanvas);
    }

    // ========== PARTICLE MATERIAL & GEOMETRY ==========
    const material = new THREE.PointsMaterial({
      size: 0.065,
      map: createCircleTexture(),
      vertexColors: true,
      transparent: true,
      opacity: 1.0,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true,
      alphaTest: 0.001
    });

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const velocities = new Float32Array(PARTICLE_COUNT * 3); // Physics velocities
    const targets = new Float32Array(PARTICLE_COUNT * 3);
    const targetColors = new Float32Array(PARTICLE_COUNT * 3);

    // Initialize
    const defaultColor = new THREE.Color('#c084fc');
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const i3 = i * 3;
      positions[i3] = (Math.random() - 0.5) * 5;
      positions[i3 + 1] = (Math.random() - 0.5) * 5;
      positions[i3 + 2] = (Math.random() - 0.5) * 5;
      targets[i3] = positions[i3];
      targets[i3 + 1] = positions[i3 + 1];
      targets[i3 + 2] = positions[i3 + 2];
      velocities[i3] = 0;
      velocities[i3 + 1] = 0;
      velocities[i3 + 2] = 0;

      colors[i3] = defaultColor.r;
      colors[i3 + 1] = defaultColor.g;
      colors[i3 + 2] = defaultColor.b;
      targetColors[i3] = defaultColor.r;
      targetColors[i3 + 1] = defaultColor.g;
      targetColors[i3 + 2] = defaultColor.b;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const points = new THREE.Points(geometry, material);
    scene.add(points);

    // ========== AUDIO REACTOR ==========
    class AudioReactor {
      constructor() {
        this.audioCtx = null;
        this.analyser = null;
        this.dataArray = null;
        this.isActive = false;
        this.bass = 0;
        this.mid = 0;
        this.treble = 0;
        this.energy = 0;
        this.smoothBass = 0;
        this.smoothEnergy = 0;
        this.frequencyBins = new Float32Array(16);
      }

      async init() {
        try {
          this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const source = this.audioCtx.createMediaStreamSource(stream);
          this.analyser = this.audioCtx.createAnalyser();
          this.analyser.fftSize = 256;
          this.analyser.smoothingTimeConstant = 0.8;
          source.connect(this.analyser);
          this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
          this.isActive = true;
          console.log('🎤 Audio reactor activated');
          return true;
        } catch (e) {
          console.error('Audio init failed:', e);
          return false;
        }
      }

      update() {
        if (!this.isActive || !this.analyser) return;
        this.analyser.getByteFrequencyData(this.dataArray);
        const len = this.dataArray.length;

        let bass = 0, mid = 0, treble = 0;
        const bassEnd = Math.floor(len * 0.12);
        const midEnd = Math.floor(len * 0.45);

        for (let i = 0; i < len; i++) {
          if (i < bassEnd) bass += this.dataArray[i];
          else if (i < midEnd) mid += this.dataArray[i];
          else treble += this.dataArray[i];
        }

        this.bass = bass / (bassEnd * 255);
        this.mid = mid / ((midEnd - bassEnd) * 255);
        this.treble = treble / ((len - midEnd) * 255);
        this.energy = this.bass * 0.5 + this.mid * 0.3 + this.treble * 0.2;

        // Smooth values for visual use
        this.smoothBass += (this.bass - this.smoothBass) * 0.15;
        this.smoothEnergy += (this.energy - this.smoothEnergy) * 0.12;

        // 16 frequency bins for visualizer bars
        const binSize = Math.floor(len / 16);
        for (let b = 0; b < 16; b++) {
          let sum = 0;
          for (let j = 0; j < binSize; j++) {
            sum += this.dataArray[b * binSize + j];
          }
          this.frequencyBins[b] = sum / (binSize * 255);
        }
      }

      stop() {
        if (this.audioCtx) {
          this.audioCtx.close();
          this.audioCtx = null;
        }
        this.isActive = false;
        this.bass = this.mid = this.treble = this.energy = 0;
        this.smoothBass = this.smoothEnergy = 0;
        this.frequencyBins.fill(0);
      }
    }

    const audioReactor = new AudioReactor();

    // ========== SHAPE GENERATORS ==========
    function generateLogoPositions(count) {
      const W = 1024, H = 1024;
      const cvs = document.createElement('canvas');
      cvs.width = W; cvs.height = H;
      const ctx = cvs.getContext('2d');

      // Draw Circular Background (subtle)
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.beginPath(); ctx.arc(W / 2, H / 2 - 100, 380, 0, Math.PI * 2); ctx.fill();

      // DRAWING SETTINGS
      const cx = W / 2;
      const cy = H / 2 - 80;
      const blueColor = '#00B0FF';
      const redColor = '#E91E63';
      const darkBorder = '#111';

      // 1. DRAW BRAIN (LEFT SIDE - RED)
      ctx.fillStyle = redColor;
      ctx.strokeStyle = darkBorder;
      ctx.lineWidth = 18;
      ctx.lineJoin = 'round';

      ctx.beginPath();
      ctx.moveTo(cx - 20, cy - 260);
      ctx.bezierCurveTo(cx - 50, cy - 280, cx - 80, cy - 290, cx - 110, cy - 270);
      ctx.bezierCurveTo(cx - 150, cy - 310, cx - 210, cy - 300, cx - 240, cy - 240);
      ctx.bezierCurveTo(cx - 290, cy - 220, cx - 310, cy - 160, cx - 280, cy - 110);
      ctx.bezierCurveTo(cx - 330, cy - 80, cx - 340, cy + 10, cx - 290, cy + 60);
      ctx.bezierCurveTo(cx - 320, cy + 120, cx - 290, cy + 200, cx - 210, cy + 220);
      ctx.bezierCurveTo(cx - 180, cy + 260, cx - 110, cy + 270, cx - 70, cy + 230);
      ctx.bezierCurveTo(cx - 40, cy + 250, cx - 30, cy + 220, cx - 20, cy + 190);
      ctx.lineTo(cx - 20, cy - 260);
      ctx.fill();
      ctx.stroke();

      // Brain Creases
      ctx.strokeStyle = darkBorder;
      ctx.lineWidth = 14;
      const drawCrease = (mx, my, tx, ty, cpx, cpy) => {
        ctx.beginPath(); ctx.moveTo(mx, my); ctx.quadraticCurveTo(cpx, cpy, tx, ty); ctx.stroke();
      };
      drawCrease(cx - 110, cy - 200, cx - 210, cy - 150, cx - 180, cy - 210);
      drawCrease(cx - 80, cy - 50, cx - 240, cy + 10, cx - 180, cy - 20);
      drawCrease(cx - 110, cy + 140, cx - 220, cy + 90, cx - 180, cy + 160);
      drawCrease(cx - 20, cy, cx - 100, cy + 40, cx - 60, cy + 10);
      drawCrease(cx - 150, cy - 240, cx - 230, cy - 210, cx - 200, cy - 250);
      drawCrease(cx - 250, cy - 100, cx - 200, cy - 30, cx - 260, cy - 60);
      drawCrease(cx - 240, cy + 140, cx - 180, cy + 190, cx - 220, cy + 180);
      drawCrease(cx - 100, cy - 120, cx - 50, cy - 140, cx - 80, cy - 100);
      drawCrease(cx - 100, cy + 60, cx - 40, cy + 80, cx - 70, cy + 50);
      drawCrease(cx - 50, cy - 220, cx - 20, cy - 180, cx - 40, cy - 210);

      // 2. DRAW CIRCUIT (RIGHT SIDE - BLUE)
      ctx.fillStyle = blueColor;
      ctx.strokeStyle = darkBorder;
      ctx.lineWidth = 18;

      ctx.beginPath();
      ctx.arc(cx + 20, cy - 35, 270, -Math.PI * 0.5, Math.PI * 0.5, false);
      ctx.lineTo(cx + 20, cy - 305);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // Stepped Circuit Lines
      const drawStepLine = (y1, x_step, y2, x_final, nodeCol) => {
        ctx.strokeStyle = darkBorder;
        ctx.lineWidth = 16;
        ctx.beginPath();
        ctx.moveTo(cx + 20, y1);
        ctx.lineTo(cx + 20 + x_step, y1);
        ctx.lineTo(cx + 20 + x_step + 40, y2);
        ctx.lineTo(cx + 20 + x_final, y2);
        ctx.stroke();
        ctx.fillStyle = nodeCol;
        ctx.beginPath();
        ctx.arc(cx + 20 + x_final, y2, 28, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = darkBorder; ctx.lineWidth = 6;
        ctx.stroke();
      };

      drawStepLine(cy - 220, 40, cy - 220, 150, '#FFD54F');
      drawStepLine(cy - 120, 60, cy - 120, 220, '#F06292');
      drawStepLine(cy - 30, 40, cy - 30, 190, '#FF8A65');
      drawStepLine(cy + 60, 50, cy + 60, 230, '#81C784');
      drawStepLine(cy + 160, 30, cy + 160, 170, '#FFD54F');

      // Circuit Interconnects
      ctx.strokeStyle = darkBorder; ctx.lineWidth = 12;
      const drawInter = (x1, y1, x2, y2) => {
        ctx.beginPath(); ctx.moveTo(cx + 20 + x1, cy + y1); ctx.lineTo(cx + 20 + x2, cy + y2); ctx.stroke();
        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(cx + 20 + x2, cy + y2, 10, 0, Math.PI * 2); ctx.fill();
      };
      drawInter(80, -220, 100, -120);
      drawInter(120, -120, 90, -30);
      drawInter(60, 60, 120, 160);
      drawInter(180, -120, 150, -30);

      // Text "CIENCIA DE DATOS"
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.font = 'bold 120px Inter, Montserrat, sans-serif';
      ctx.fillText('CIENCIA', cx, cy + 460);
      ctx.font = 'bold 90px Inter, Montserrat, sans-serif';
      ctx.fillText('DE DATOS', cx, cy + 580);

      // Sample
      const imageData = ctx.getImageData(0, 0, W, H).data;
      const pts = [];
      const cols = [];
      for (let y = 0; y < H; y += 2) {
        for (let x = 0; x < W; x += 2) {
          const idx = (y * W + x) * 4;
          if (imageData[idx + 3] > 128) {
            pts.push([x, y]);
            cols.push([imageData[idx] / 255, imageData[idx + 1] / 255, imageData[idx + 2] / 255]);
          }
        }
      }

      const result = [];
      for (let i = 0; i < count; i++) {
        const idx = Math.floor(Math.random() * pts.length);
        const p = pts[idx];
        const c = cols[idx];
        const scale = 6.8 / W;
        result.push({
          pos: [(p[0] - W / 2) * scale, -(p[1] - H / 2) * scale - 0.2, (Math.random() - 0.5) * 0.05],
          col: c
        });
      }
      return result;
    }

    // ========== TEXT-TO-PARTICLES ENGINE ==========
    let welcomePositions = null;

    function generateTextPositions(text, count) {
      const offCanvas = document.createElement('canvas');
      const W = 1024, H = 320;
      offCanvas.width = W;
      offCanvas.height = H;
      const ctx = offCanvas.getContext('2d');

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const lines = text.split('\n');
      const fontSize = Math.min(48, W / (Math.max(...lines.map(l => l.length)) * 0.65));
      ctx.font = `bold ${fontSize}px Inter, Arial, sans-serif`;

      const lineHeight = fontSize * 1.4;
      const totalHeight = lines.length * lineHeight;
      const startY = (H - totalHeight) / 2 + lineHeight / 2;

      for (let li = 0; li < lines.length; li++) {
        ctx.fillText(lines[li], W / 2, startY + li * lineHeight);
      }

      const imageData = ctx.getImageData(0, 0, W, H).data;
      const filledPixels = [];
      let minX = W, maxX = 0, minY = H, maxY = 0;

      for (let py = 0; py < H; py += 1) {
        for (let px = 0; px < W; px += 1) {
          const idx = (py * W + px) * 4;
          if (imageData[idx] > 128) {
            filledPixels.push([px, py]);
            if (px < minX) minX = px;
            if (px > maxX) maxX = px;
            if (py < minY) minY = py;
            if (py > maxY) maxY = py;
          }
        }
      }

      const centerX = (minX + maxX) / 2;
      const centerY = (minY + maxY) / 2;
      const scale = 8.8 / W;

      const result = [];
      const textParticleCount = Math.floor(count * 0.75);
      const fireworkParticleCount = count - textParticleCount;

      window.particleMetadata = new Float32Array(count * 5);

      // TEXT PARTICLES WITH GRADIENT & SPARKLES
      for (let i = 0; i < textParticleCount; i++) {
        if (filledPixels.length > 0) {
          const idx = Math.floor(Math.random() * filledPixels.length);
          const [px, py] = filledPixels[idx];

          const x = (px - centerX) * scale;
          const y = -(py - centerY) * scale * 1.5;
          const z = (Math.random() - 0.5) * 0.05;

          window.particleMetadata[i * 5] = 0;

          const normY = (py - minY) / (maxY - minY);
          let col = [
            (1 - normY) * 0.91 + normY * 0.0,
            (1 - normY) * 0.12 + normY * 0.69,
            (1 - normY) * 0.39 + normY * 1.0
          ];

          if (Math.random() < 0.12) col = [1.0, 0.84, 0.31]; // Gold sparkles

          result.push({ pos: [x, y, z], col: col });
        }
      }

      // FIREWORKS EXPLOSIONS
      const fireworkColors = [
        [0.29, 0.87, 0.50], [1.0, 0.84, 0.31],
        [0.91, 0.12, 0.39], [0.0, 0.69, 1.0]
      ];

      const centers = [
        [-3.8, 1.8], [3.8, 1.8],
        [-4.5, 0.0], [4.5, 0.0],
        [-3.6, -1.5], [3.6, -1.5]
      ];

      const particlesPerBurst = Math.floor(fireworkParticleCount / centers.length);
      let pIdx = textParticleCount;
      centers.forEach((center, cIdx) => {
        const burstCol = fireworkColors[cIdx % fireworkColors.length];
        for (let i = 0; i < particlesPerBurst; i++) {
          if (pIdx >= count) break;
          const r = Math.random() * 0.8;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.random() * Math.PI;

          const rx = r * Math.sin(phi) * Math.cos(theta);
          const ry = r * Math.sin(phi) * Math.sin(theta);
          const rz = r * Math.cos(phi);

          const vPhi = Math.random() * Math.PI * 2;
          const vCosAlpha = Math.random() * 2 - 1;
          const vSinAlpha = Math.sqrt(1 - vCosAlpha * vCosAlpha);
          const speed = 3.5 + Math.random() * 3.0;

          const mIdx = pIdx * 5;
          window.particleMetadata[mIdx] = 1;
          window.particleMetadata[mIdx + 1] = cIdx;
          window.particleMetadata[mIdx + 2] = speed * vSinAlpha * Math.cos(vPhi);
          window.particleMetadata[mIdx + 3] = speed * vSinAlpha * Math.sin(vPhi) + 1.2;
          window.particleMetadata[mIdx + 4] = speed * vCosAlpha;

          pIdx++;

          result.push({
            pos: [center[0], center[1], 0],
            col: burstCol,
            fireworkCenter: center
          });
        }
      });

      return result;
    }

    // ========== GALAXY SHAPE (NEW) ==========
    function generateGalaxyPositions(count) {
      const result = [];
      const arms = 5;
      const armSpread = 0.45;
      const coreDensity = 0.35; // fraction of particles in core

      const coreCount = Math.floor(count * coreDensity);
      const armCount = count - coreCount;

      // Galaxy Core: dense sphere with warm colors
      for (let i = 0; i < coreCount; i++) {
        const r = Math.pow(Math.random(), 2) * 0.8; // power distribution → dense center
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);

        const x = r * Math.sin(phi) * Math.cos(theta);
        const y = r * Math.sin(phi) * Math.sin(theta) * 0.3; // flatten
        const z = r * Math.cos(phi);

        // Core: white/gold → orange gradient
        const t = r / 0.8;
        const col = [
          1.0 - t * 0.15,
          0.9 - t * 0.3,
          0.7 - t * 0.5
        ];

        result.push({ pos: [x, y, z], col });
      }

      // Spiral Arms
      for (let i = 0; i < armCount; i++) {
        const armIdx = i % arms;
        const armAngle = armIdx * (Math.PI * 2 / arms);

        const r = 0.5 + Math.pow(Math.random(), 0.6) * 3.2;
        const spinAngle = r * 1.8; // spiral tightness
        const angle = armAngle + spinAngle;

        // Spread increases with distance
        const spread = armSpread * (0.5 + r * 0.2);
        const randomX = (Math.random() - 0.5) * spread;
        const randomY = (Math.random() - 0.5) * spread * 0.15;
        const randomZ = (Math.random() - 0.5) * spread;

        const x = Math.cos(angle) * r + randomX;
        const y = randomY;
        const z = Math.sin(angle) * r + randomZ;

        // Color: inner warm → outer cool (purple/blue)
        const t = Math.min(1, r / 3.5);
        let col;
        if (t < 0.3) {
          // Inner: gold → pink
          const s = t / 0.3;
          col = [1.0 - s * 0.1, 0.75 - s * 0.3, 0.3 + s * 0.4];
        } else if (t < 0.7) {
          // Mid: pink → purple
          const s = (t - 0.3) / 0.4;
          col = [0.9 - s * 0.15, 0.45 - s * 0.15, 0.7 + s * 0.15];
        } else {
          // Outer: purple → cyan
          const s = (t - 0.7) / 0.3;
          col = [0.75 - s * 0.5, 0.3 + s * 0.35, 0.85 + s * 0.15];
        }

        // Random bright stars
        if (Math.random() < 0.03) col = [1, 1, 1];

        result.push({ pos: [x, y, z], col });
      }

      return result;
    }

    // ========== SHAPE STATE ==========
    let currentShape = 'cloud';
    let gestureShape = null;
    let lastGestureShape = 'cloud';

    const shapeGenerators = {
      cloud: (count) => {
        const res = [];
        for (let i = 0; i < count; i++) {
          // Layered density cloud: denser at center
          const r = Math.pow(Math.random(), 0.7) * 4;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);
          const x = r * Math.sin(phi) * Math.cos(theta);
          const y = r * Math.sin(phi) * Math.sin(theta);
          const z = r * Math.cos(phi);

          // Gradient: center purple → edge blue
          const t = r / 4;
          res.push({
            pos: [x, y, z],
            col: [0.75 - t * 0.3, 0.55 - t * 0.2, 0.98]
          });
        }
        return res;
      },
      logo: generateLogoPositions,
      galaxy: generateGalaxyPositions,
      welcome: (count) => {
        return generateTextPositions(
          'BIENVENIDOS A LA DEMOSTRACION\nY PRESENTACION DE\nCIENCIA DE DATOS',
          count
        );
      }
    };

    function setTargets(shapeName) {
      if (shapeName === 'welcome') {
        welcomePositions = null;
      }
      const gen = shapeGenerators[shapeName];
      if (!gen) return;
      const data = gen(PARTICLE_COUNT);
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        targets[i3] = data[i].pos[0];
        targets[i3 + 1] = data[i].pos[1];
        targets[i3 + 2] = data[i].pos[2];

        targetColors[i3] = data[i].col[0];
        targetColors[i3 + 1] = data[i].col[1];
        targetColors[i3 + 2] = data[i].col[2];
      }
    }

    setTargets('cloud');

    // ========== GESTURE STATE ==========
    let gestureFactor = 0;
    let smoothGesture = 0;
    const GESTURE_SMOOTH = 0.08;

    // ========== HAND TRACKING STATE ==========
    let handX = 0.5, handY = 0.5;
    let handRotZ = 0;
    let smoothHandX = 0, smoothHandY = 0;
    let smoothHandRotZ = 0;
    let handDetected = false;
    const HAND_TRACK_SMOOTH = 0.07;
    const HAND_MOVE_RANGE = 3.5;

    // ========== MEDIAPIPE HANDS ==========
    const videoEl = document.getElementById('cam-video');
    const overlayCanvas = document.getElementById('cam-overlay');
    const overlayCtx = overlayCanvas.getContext('2d');
    const gestureDot = document.getElementById('gesture-dot');
    const gestureText = document.getElementById('gesture-text');

    function calcOpenness(landmarks) {
      const wrist = landmarks[0];
      const tips = [4, 8, 12, 16, 20];
      const mids = [2, 5, 9, 13, 17];
      let openScore = 0;
      for (let j = 0; j < tips.length; j++) {
        const tip = landmarks[tips[j]];
        const mid = landmarks[mids[j]];
        const tipDist = Math.hypot(tip.x - wrist.x, tip.y - wrist.y, tip.z - wrist.z);
        const midDist = Math.hypot(mid.x - wrist.x, mid.y - wrist.y, mid.z - wrist.z);
        openScore += tipDist / (midDist + 0.001);
      }
      openScore /= tips.length;
      return Math.max(0, Math.min(1, (openScore - 1.2) / 1.0));
    }

    // ========== GESTURE DETECTION ==========
    function isFingerExtended(landmarks, tipIdx, pipIdx, mcpIdx) {
      const wrist = landmarks[0];
      const tipDist = Math.hypot(
        landmarks[tipIdx].x - wrist.x,
        landmarks[tipIdx].y - wrist.y
      );
      const pipDist = Math.hypot(
        landmarks[pipIdx].x - wrist.x,
        landmarks[pipIdx].y - wrist.y
      );
      return tipDist > pipDist * 1.1;
    }

    function detectGesture(landmarks) {
      const index = isFingerExtended(landmarks, 8, 6, 5);
      const middle = isFingerExtended(landmarks, 12, 10, 9);
      const ring = isFingerExtended(landmarks, 16, 14, 13);
      const pinky = isFingerExtended(landmarks, 20, 18, 17);

      // 🌀 3 dedos (index + middle + ring) → Galaxy
      if (index && middle && ring && !pinky) return 'three_up';
      // ✌️ 2 dedos (index + middle) → Welcome
      if (index && middle && !ring && !pinky) return 'peace';
      // ☝️ 1 dedo (index) → Logo
      if (index && !middle && !ring && !pinky) return 'point';
      return null;
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.5,
    });

    hands.onResults((results) => {
      overlayCanvas.width = overlayCanvas.clientWidth;
      overlayCanvas.height = overlayCanvas.clientHeight;
      overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        handDetected = true;
        let bestGesture = null;
        let currentOpenness = 0;
        let navHandFound = false;
        let cmdHandFound = false;

        results.multiHandLandmarks.forEach((lm, index) => {
          const label = results.multiHandedness[index].label;

          if (label === 'Left' || results.multiHandLandmarks.length === 1) {
            navHandFound = true;
            const open = calcOpenness(lm);
            currentOpenness = open;

            const palm = lm[9];
            handX = palm.x;
            handY = palm.y;
            const wrist = lm[0];
            const midBase = lm[9];
            handRotZ = Math.atan2(midBase.x - wrist.x, wrist.y - midBase.y);
          }

          if (label === 'Right' || results.multiHandLandmarks.length === 1) {
            cmdHandFound = true;
            const g = detectGesture(lm);
            if (g) bestGesture = g;
          }

          // Draw landmarks with glow
          const markerColor = label === 'Left' ? 'rgba(74,222,128,0.8)' : 'rgba(192,132,252,0.8)';
          overlayCtx.fillStyle = markerColor;
          overlayCtx.shadowColor = markerColor;
          overlayCtx.shadowBlur = 4;
          for (const p of lm) {
            overlayCtx.beginPath();
            overlayCtx.arc(p.x * overlayCanvas.width, p.y * overlayCanvas.height, 2, 0, Math.PI * 2);
            overlayCtx.fill();
          }
          overlayCtx.shadowBlur = 0;
        });

        gestureFactor = currentOpenness;

        if (bestGesture === 'three_up') {
          gestureShape = 'galaxy';
          if (!navHandFound && gestureFactor < 0.8) gestureFactor = 1.6;
          gestureDot.className = 'open';
          gestureText.textContent = '🌀 3 Dedos → Galaxy';
          gestureText.style.color = '#f59e0b';
        } else if (bestGesture === 'peace') {
          gestureShape = 'welcome';
          if (!navHandFound && gestureFactor < 0.8) gestureFactor = 1.6;
          gestureDot.className = 'open';
          gestureText.textContent = '✌️ Peace → Welcome';
          gestureText.style.color = '#c084fc';
        } else if (bestGesture === 'point') {
          gestureShape = 'logo';
          if (!navHandFound && gestureFactor < 0.8) gestureFactor = 1.6;
          gestureDot.className = 'open';
          gestureText.textContent = '☝️ Index → Logo';
          gestureText.style.color = '#38bdf8';
        } else if (currentOpenness > 0.5) {
          gestureShape = 'cloud';
          gestureDot.className = 'open';
          gestureText.textContent = '🖐 Open → Vortex Active';
          gestureText.style.color = '#4ade80';
        } else {
          gestureShape = 'cloud';
          gestureDot.className = 'closed';
          gestureText.textContent = '✊ Cloud';
          gestureText.style.color = 'rgba(255,255,255,0.45)';
        }
      } else {
        gestureFactor = 0;
        handDetected = false;
        gestureShape = 'cloud';
        gestureDot.className = '';
        gestureText.textContent = 'Sin mano → Cloud';
        gestureText.style.color = 'rgba(255,255,255,0.45)';
      }
    });

    // Start camera
    let isCamRunning = true;
    const camUtil = new Camera(videoEl, {
      onFrame: async () => {
        if (isCamRunning) {
          await hands.send({ image: videoEl });
        }
      },
      width: 320,
      height: 240,
    });
    camUtil.start();

    document.getElementById('cam-toggle-btn').addEventListener('click', (e) => {
      isCamRunning = !isCamRunning;
      const wrapper = document.getElementById('cam-wrapper');
      const btn = e.target;

      if (isCamRunning) {
        btn.textContent = 'Apagar Cámara';
        wrapper.classList.remove('off');
        camUtil.start();
      } else {
        btn.textContent = 'Encender Cámara';
        wrapper.classList.add('off');
        camUtil.stop();
        handDetected = false;
        gestureShape = null;
        gestureDot.className = '';
        gestureText.textContent = 'Cámara apagada';
      }
    });

    // ========== MOUSE ORBIT ==========
    let mouseX = 0, mouseY = 0;
    let rotX = 0, rotY = 0;
    let isDragging = false;

    canvas.addEventListener('pointerdown', () => isDragging = true);
    window.addEventListener('pointerup', () => isDragging = false);
    canvas.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      mouseX += e.movementX * 0.003;
      mouseY += e.movementY * 0.003;
      mouseY = Math.max(-1.2, Math.min(1.2, mouseY));
    });

    // ========== FPS COUNTER ==========
    let fpsFrames = 0;
    let fpsTime = performance.now();
    const fpsBadge = document.getElementById('fps-badge');

    // ========== AUDIO BARS UI ==========
    const audioBars = document.querySelectorAll('.audio-bar');
    const audioBarsContainer = document.getElementById('audio-bars');

    // ========== ANIMATION LOOP ==========
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      const t = clock.elapsedTime;

      // FPS counter
      fpsFrames++;
      if (performance.now() - fpsTime > 1000) {
        fpsBadge.textContent = fpsFrames + ' FPS';
        fpsFrames = 0;
        fpsTime = performance.now();
      }

      // Audio update
      audioReactor.update();

      // Update audio bars UI
      if (audioReactor.isActive) {
        for (let b = 0; b < audioBars.length; b++) {
          const h = Math.max(2, audioReactor.frequencyBins[b] * 24);
          audioBars[b].style.height = h + 'px';
        }
      }

      // --- Gesture-driven shape switching ---
      let activeShape = gestureShape || 'cloud';
      if (activeShape !== lastGestureShape) {
        setTargets(activeShape);
        lastGestureShape = activeShape;
        document.querySelectorAll('.shape-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.shape === activeShape);
        });
      }

      // Smooth gesture
      smoothGesture += (gestureFactor - smoothGesture) * GESTURE_SMOOTH;

      // --- Smooth hand tracking ---
      const isLogo = (lastGestureShape === 'logo');
      const moveInertia = isLogo ? 0.04 : HAND_TRACK_SMOOTH;

      if (handDetected) {
        const targetX = -(handX - 0.5) * HAND_MOVE_RANGE * 2;
        const targetY = -(handY - 0.5) * HAND_MOVE_RANGE * 2;
        smoothHandX += (targetX - smoothHandX) * moveInertia;
        smoothHandY += (targetY - smoothHandY) * moveInertia;
        smoothHandRotZ += (handRotZ - smoothHandRotZ) * moveInertia;
      } else {
        smoothHandX += (0 - smoothHandX) * moveInertia * 0.5;
        smoothHandY += (0 - smoothHandY) * moveInertia * 0.5;
        smoothHandRotZ += (0 - smoothHandRotZ) * moveInertia * 0.5;
      }

      // Expansion factor
      const audioExpand = audioReactor.isActive ? audioReactor.smoothBass * 0.6 : 0;
      const expansionScale = 1.0 + smoothGesture * 2.5 + audioExpand;

      // Auto-rotation (with audio speed modulation)
      const audioRotBoost = audioReactor.isActive ? audioReactor.smoothEnergy * 0.02 : 0;
      if (autoRotate) {
        if (isLogo) rotX += 0.012 + audioRotBoost;
        else if (lastGestureShape === 'galaxy') rotX += 0.003 + audioRotBoost;
        else rotX += 0.005 + audioRotBoost;
      }

      // Vortex parameters
      const vortexActive = handDetected && smoothGesture > 0.3;
      const vortexStrength = smoothGesture * 8.0;
      const vortexRadius = 2.5;
      const friction = 0.92;

      // Audio-driven bloom modulation
      if (bloomPass) {
        const baseBloom = 1.6;
        const audioBloom = audioReactor.isActive ? audioReactor.smoothBass * 1.5 : 0;
        bloomPass.strength = baseBloom + audioBloom;
      }

      // --- PARTICLE UPDATE LOOP ---
      const pos = geometry.attributes.position.array;
      const col = geometry.attributes.color.array;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        let tx = targets[i3] * expansionScale;
        let ty = targets[i3 + 1] * expansionScale;
        let tz = targets[i3 + 2] * expansionScale;
        let tr = targetColors[i3];
        let tg = targetColors[i3 + 1];
        let tb = targetColors[i3 + 2];

        // Welcome mode effects (preserved from original)
        const isWelcome = (lastGestureShape === 'welcome');
        if (isWelcome && window.particleMetadata && window.particleMetadata.length > i * 5) {
          const mIdx = i * 5;
          const type = window.particleMetadata[mIdx];

          if (type === 0) {
            const hueShift = Math.sin(t * 1.5 + ty * 0.5) * 0.35;
            tr = Math.max(0.1, Math.min(1, tr + hueShift + 0.1));
            tb = Math.max(0.1, Math.min(1, tb - hueShift + 0.1));
            tg = Math.max(0.1, Math.min(1, tg + 0.1));
          } else if (type === 1) {
            const burstIdx = window.particleMetadata[mIdx + 1];
            const vx = window.particleMetadata[mIdx + 2];
            const vy = window.particleMetadata[mIdx + 3];
            const vz = window.particleMetadata[mIdx + 4];

            const life = (t + burstIdx * 0.6) % 3.5;
            const age = life;

            if (age < 3.0) {
              const gravity = 2.2;
              const drag = Math.pow(0.5, age);
              tx = tx + vx * age * drag;
              ty = ty + vy * age * drag - 0.5 * gravity * age * age;
              tz = tz + vz * age * drag;

              if (age > 1.4) {
                const fade = 1.0 - Math.min(1, (age - 1.4) / 1.4);
                tr *= fade; tg *= fade; tb *= fade;
              }
            } else {
              tr = tg = tb = 0;
            }
          }
        }

        // Galaxy rotation animation
        if (lastGestureShape === 'galaxy') {
          const dist = Math.sqrt(tx * tx + tz * tz);
          if (dist > 0.3) {
            const angle = Math.atan2(tz, tx);
            const rotSpeed = 0.15 / (0.5 + dist * 0.3); // Inner rotates faster
            const newAngle = angle + rotSpeed * t;
            tx = Math.cos(newAngle) * dist;
            tz = Math.sin(newAngle) * dist;
          }
        }

        // Audio color modulation (subtle hue shift)
        if (audioReactor.isActive && !isWelcome) {
          const audioHue = audioReactor.smoothBass * 0.3;
          const trebleSparkle = audioReactor.treble * 0.4;
          tr = Math.min(1, tr + audioHue * 0.5);
          tg = Math.min(1, tg + trebleSparkle * 0.3);
          tb = Math.min(1, tb + audioReactor.smoothEnergy * 0.2);
        }

        // --- VORTEX PHYSICS ---
        if (vortexActive) {
          const dx = pos[i3];
          const dy = pos[i3 + 1];
          const dz = pos[i3 + 2];
          const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) + 0.01;

          if (dist < vortexRadius) {
            const normalizedDist = dist / vortexRadius;
            const force = vortexStrength * (1 - normalizedDist * normalizedDist);

            // Tangential force (swirl around Y axis)
            const angle = Math.atan2(dz, dx);
            velocities[i3] += (-Math.sin(angle) * force) * dt;
            velocities[i3 + 2] += (Math.cos(angle) * force) * dt;

            // Slight upward pull
            velocities[i3 + 1] += force * 0.3 * dt;

            // Radial scatter
            velocities[i3] += dx / dist * force * 0.15 * dt;
            velocities[i3 + 2] += dz / dist * force * 0.15 * dt;
          }
        }

        // Apply velocity friction
        velocities[i3] *= friction;
        velocities[i3 + 1] *= friction;
        velocities[i3 + 2] *= friction;

        // Audio-driven micro-vibration
        if (audioReactor.isActive) {
          const vibAmt = audioReactor.smoothBass * 0.03;
          velocities[i3] += (Math.random() - 0.5) * vibAmt;
          velocities[i3 + 1] += (Math.random() - 0.5) * vibAmt;
          velocities[i3 + 2] += (Math.random() - 0.5) * vibAmt;
        }

        // Position update: lerp to target + velocity
        pos[i3] += (tx - pos[i3]) * LERP_SPEED + velocities[i3] * dt;
        pos[i3 + 1] += (ty - pos[i3 + 1]) * LERP_SPEED + velocities[i3 + 1] * dt;
        pos[i3 + 2] += (tz - pos[i3 + 2]) * LERP_SPEED + velocities[i3 + 2] * dt;

        // Color lerp
        col[i3] += (tr - col[i3]) * LERP_SPEED;
        col[i3 + 1] += (tg - col[i3 + 1]) * LERP_SPEED;
        col[i3 + 2] += (tb - col[i3 + 2]) * LERP_SPEED;
      }
      geometry.attributes.position.needsUpdate = true;
      geometry.attributes.color.needsUpdate = true;

      // --- Camera/Rotation ---
      const isTextShape = (lastGestureShape === 'welcome');
      rotX += (mouseX - rotX) * 0.05;
      rotY += (mouseY - rotY) * 0.05;

      if (isTextShape) {
        points.rotation.y = rotX * 0.2;
        points.rotation.x = rotY * 0.2;
        points.rotation.z = 0;
      } else if (lastGestureShape === 'galaxy') {
        // Galaxy: gentle tilt, main rotation handled per-particle
        points.rotation.y = (autoRotate ? t * 0.05 : 0) + rotX;
        points.rotation.x = -0.5 + rotY; // Tilted view
        points.rotation.z = smoothHandRotZ * 0.3;
      } else {
        points.rotation.y = (autoRotate ? t * 0.12 : 0) + rotX;
        points.rotation.x = rotY;
        points.rotation.z = smoothHandRotZ;
      }

      // Hand position → figure translation
      points.position.x = smoothHandX;
      points.position.y = smoothHandY;

      // Particle size: base + gesture + audio
      const audioSize = audioReactor.isActive ? audioReactor.smoothBass * 0.04 : 0;
      material.size = 0.05 + smoothGesture * 0.04 + audioSize;

      // Render
      if (composer) {
        composer.render();
      } else {
        renderer.render(scene, camera3D);
      }
    }
    animate();

    // ========== UI INTERACTIONS ==========

    // Shape buttons
    document.querySelectorAll('.shape-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentShape = btn.dataset.shape;
        setTargets(currentShape);
        lastGestureShape = currentShape;
      });
    });

    // Color picker
    document.getElementById('color-picker').addEventListener('input', (e) => {
      const hex = e.target.value;
      const c = new THREE.Color(hex);
      defaultColor.set(hex);
      if (currentShape !== 'logo' && currentShape !== 'welcome' && currentShape !== 'galaxy') {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const i3 = i * 3;
          targetColors[i3] = c.r;
          targetColors[i3 + 1] = c.g;
          targetColors[i3 + 2] = c.b;
        }
      }
    });

    // Audio toggle
    document.getElementById('audio-toggle-btn').addEventListener('click', async (e) => {
      const btn = e.target;
      if (!audioReactor.isActive) {
        const success = await audioReactor.init();
        if (success) {
          btn.textContent = '🎤 Activo';
          btn.classList.add('active');
          audioBarsContainer.classList.add('active');
        }
      } else {
        audioReactor.stop();
        btn.textContent = '🎤 Activar';
        btn.classList.remove('active');
        audioBarsContainer.classList.remove('active');
        audioBars.forEach(bar => bar.style.height = '2px');
      }
    });

    // Rotation Toggle
    document.getElementById('rotate-toggle-btn').addEventListener('click', (e) => {
      autoRotate = !autoRotate;
      e.target.textContent = autoRotate ? '⏸ Pausar' : '▶️ Reanudar';
    });

    // Fullscreen
    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    // Toggle panel (mobile)
    document.getElementById('toggle-panel').addEventListener('click', () => {
      document.getElementById('ui-panel').classList.toggle('visible');
    });

    // Handle resize
    window.addEventListener('resize', () => {
      camera3D.aspect = window.innerWidth / window.innerHeight;
      camera3D.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      if (composer) {
        composer.setSize(window.innerWidth, window.innerHeight);
      }
    });
  </script>
</body>

</html>
