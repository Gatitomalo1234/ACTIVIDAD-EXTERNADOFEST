<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Particle System — Hand Gesture Control</title>
  <meta name="description"
    content="Interactive 3D particle system controlled by hand gestures, built with Three.js and MediaPipe.">

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      color: #fff;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    canvas#three-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ---- UI Panel ---- */
    #ui-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      width: 260px;
      background: rgba(15, 15, 25, 0.65);
      backdrop-filter: blur(18px) saturate(1.6);
      -webkit-backdrop-filter: blur(18px) saturate(1.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      transition: transform 0.3s ease;
    }

    #ui-panel h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #a78bfa, #6dd5ed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 4px;
    }

    /* Shape buttons */
    .shapes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .shape-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 8px 4px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-family: inherit;
    }

    .shape-btn .icon {
      font-size: 18px;
    }

    .shape-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(167, 139, 250, 0.4);
      transform: translateY(-1px);
    }

    .shape-btn.active {
      background: rgba(167, 139, 250, 0.2);
      border-color: rgba(167, 139, 250, 0.6);
      color: #fff;
      box-shadow: 0 0 12px rgba(167, 139, 250, 0.15);
    }

    /* Color picker row */
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-row label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      flex: 1;
    }

    input[type="color"] {
      -webkit-appearance: none;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 2px;
    }

    input[type="color"]::-webkit-color-swatch {
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
    }

    /* Gesture status */
    #gesture-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.55);
    }

    #gesture-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    #gesture-dot.open {
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
    }

    #gesture-dot.closed {
      background: #f97316;
      box-shadow: 0 0 6px #f97316;
    }

    /* Webcam preview */
    #cam-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #05050a;
    }

    #cam-off-message {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.8);
      z-index: 5;
    }

    #cam-wrapper.off #cam-off-message {
      display: flex;
    }

    #cam-wrapper video,
    #cam-wrapper canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #cam-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    #cam-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      font-size: 9px;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.5);
      padding: 2px 7px;
      border-radius: 6px;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.6);
      z-index: 10;
    }

    #cam-toggle-btn {
      position: absolute;
      bottom: 6px;
      right: 6px;
      font-size: 10px;
      font-weight: 600;
      background: rgba(167, 139, 250, 0.3);
      border: 1px solid rgba(167, 139, 250, 0.5);
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      color: #fff;
      backdrop-filter: blur(4px);
      z-index: 10;
      transition: all 0.2s;
    }

    #cam-toggle-btn:hover {
      background: rgba(167, 139, 250, 0.5);
    }

    /* Fullscreen btn */
    .action-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 10px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
      width: 100%;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    /* Toggle panel btn (mobile) */
    #toggle-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 101;
      background: rgba(15, 15, 25, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      width: 40px;
      height: 40px;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      #toggle-panel {
        display: flex;
      }

      #ui-panel {
        transform: translateX(-300px);
      }

      #ui-panel.visible {
        transform: translateX(0);
      }
    }
  </style>
</head>

<body>

  <div id="canvas-container">
    <canvas id="three-canvas"></canvas>
  </div>

  <button id="toggle-panel" aria-label="Toggle panel">☰</button>

  <div id="ui-panel" class="visible">
    <h1>✦ Particle System</h1>

    <div>
      <div class="section-label">Shape</div>
      <div class="shapes-grid">
        <button class="shape-btn" data-shape="logo">
          <span class="shape-icon">🧠</span> Logo
        </button>
        <button class="shape-btn active" data-shape="cloud">
          <span class="shape-icon">☁️</span> Cloud
        </button>
        <button class="shape-btn" data-shape="welcome">
          <span class="shape-icon">✌️</span> Welcome
        </button>
      </div>
    </div>

    <div>
      <div class="section-label">Color</div>
      <div class="color-row">
        <label>Particle Color</label>
        <input type="color" id="color-picker" value="#a78bfa">
      </div>
    </div>

    <div>
      <div class="section-label">Camera</div>
      <div id="cam-wrapper">
        <video id="cam-video" playsinline></video>
        <canvas id="cam-overlay"></canvas>
        <div id="cam-badge">LIVE</div>
        <div id="cam-off-message">Cámara Desactivada<br><span style="font-size: 9px; opacity: 0.6;">(Tracking
            pausado)</span></div>
        <button id="cam-toggle-btn">Apagar Cámara</button>
      </div>
    </div>

    <div>
      <div class="section-label">Gesture</div>
      <div id="gesture-status">
        <span id="gesture-dot"></span>
        <span id="gesture-text">Waiting for hand…</span>
      </div>
    </div>

    <button class="action-btn" id="rotate-toggle-btn">⏸ Pausar Giro</button>
    <button class="action-btn" id="fullscreen-btn">⛶ Fullscreen</button>
  </div>

  <script>
    // ========== CONFIG ==========
    const PARTICLE_COUNT = 15000;
    const LERP_SPEED = 0.04;
    let autoRotate = true; // Global rotation toggle

    // ========== THREE.JS SETUP ==========
    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera3D = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera3D.position.z = 5;

    // v5.4: Circular particle texture for a more premium "glow" look
    function createCircleTexture() {
      const size = 64;
      const tCanvas = document.createElement('canvas');
      tCanvas.width = size; tCanvas.height = size;
      const tCtx = tCanvas.getContext('2d');
      const center = size / 2;
      const radius = size / 2 - 2;
      const grad = tCtx.createRadialGradient(center, center, 0, center, center, radius);
      grad.addColorStop(0, 'rgba(255,255,255,1)');
      grad.addColorStop(0.4, 'rgba(255,255,255,0.8)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      tCtx.fillStyle = grad;
      tCtx.beginPath();
      tCtx.arc(center, center, radius, 0, Math.PI * 2);
      tCtx.fill();
      return new THREE.CanvasTexture(tCanvas);
    }

    // Particle material
    const material = new THREE.PointsMaterial({
      size: 0.04, // Slightly larger for circular alpha falloff
      map: createCircleTexture(),
      vertexColors: true,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true,
      alphaTest: 0.001
    });

    // Create geometry
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3); // Per-particle RGB
    const velocities = new Float32Array(PARTICLE_COUNT * 3);
    const targets = new Float32Array(PARTICLE_COUNT * 3);
    const targetColors = new Float32Array(PARTICLE_COUNT * 3); // target RGB

    // Initialize with random cloud and default color
    const defaultColor = new THREE.Color('#a78bfa');
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const i3 = i * 3;
      positions[i3] = (Math.random() - 0.5) * 5;
      positions[i3 + 1] = (Math.random() - 0.5) * 5;
      positions[i3 + 2] = (Math.random() - 0.5) * 5;
      targets[i3] = positions[i3];
      targets[i3 + 1] = positions[i3 + 1];
      targets[i3 + 2] = positions[i3 + 2];

      colors[i3] = defaultColor.r;
      colors[i3 + 1] = defaultColor.g;
      colors[i3 + 2] = defaultColor.b;
      targetColors[i3] = defaultColor.r;
      targetColors[i3 + 1] = defaultColor.g;
      targetColors[i3 + 2] = defaultColor.b;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const points = new THREE.Points(geometry, material);
    scene.add(points);

    // ========== SHAPE GENERATORS ==========
    function generateLogoPositions(count) {
      const W = 1024, H = 1024;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Draw Circular Background (subtle)
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.beginPath(); ctx.arc(W / 2, H / 2 - 100, 380, 0, Math.PI * 2); ctx.fill();

      // DRAWING SETTINGS
      const cx = W / 2;
      const cy = H / 2 - 80;
      const blueColor = '#00B0FF';
      const redColor = '#E91E63'; // Slightly more vibrant pink/red
      const darkBorder = '#111';

      // 1. DRAW BRAIN (LEFT SIDE - RED)
      ctx.fillStyle = redColor;
      ctx.strokeStyle = darkBorder;
      ctx.lineWidth = 18; // Bold vector outline
      ctx.lineJoin = 'round';

      ctx.beginPath();
      // Starting from top center
      ctx.moveTo(cx - 20, cy - 260);

      // 9 Puffy Lobes (Puffiness Factor)
      // Top lobes
      ctx.bezierCurveTo(cx - 50, cy - 280, cx - 80, cy - 290, cx - 110, cy - 270); // L1
      ctx.bezierCurveTo(cx - 150, cy - 310, cx - 210, cy - 300, cx - 240, cy - 240); // L2
      ctx.bezierCurveTo(cx - 290, cy - 220, cx - 310, cy - 160, cx - 280, cy - 110); // L3
      // Outer side
      ctx.bezierCurveTo(cx - 330, cy - 80, cx - 340, cy + 10, cx - 290, cy + 60);    // L4
      ctx.bezierCurveTo(cx - 320, cy + 120, cx - 290, cy + 200, cx - 210, cy + 220); // L5
      ctx.bezierCurveTo(cx - 180, cy + 260, cx - 110, cy + 270, cx - 70, cy + 230);  // L6
      ctx.bezierCurveTo(cx - 40, cy + 250, cx - 30, cy + 220, cx - 20, cy + 190);   // L7

      ctx.lineTo(cx - 20, cy - 260);
      ctx.fill();
      ctx.stroke();

      // Brain Creases (Thick internal lines)
      ctx.strokeStyle = darkBorder;
      ctx.lineWidth = 14;
      const drawCrease = (mx, my, tx, ty, cpx, cpy) => {
        ctx.beginPath(); ctx.moveTo(mx, my); ctx.quadraticCurveTo(cpx, cpy, tx, ty); ctx.stroke();
      };
      drawCrease(cx - 110, cy - 200, cx - 210, cy - 150, cx - 180, cy - 210);
      drawCrease(cx - 80, cy - 50, cx - 240, cy + 10, cx - 180, cy - 20);
      drawCrease(cx - 110, cy + 140, cx - 220, cy + 90, cx - 180, cy + 160);
      drawCrease(cx - 20, cy, cx - 100, cy + 40, cx - 60, cy + 10);

      // 2. DRAW CIRCUIT (RIGHT SIDE - BLUE)
      ctx.fillStyle = blueColor;
      ctx.strokeStyle = darkBorder;
      ctx.lineWidth = 18;

      ctx.beginPath();
      ctx.arc(cx + 20, cy - 35, 270, -Math.PI * 0.5, Math.PI * 0.5, false);
      ctx.lineTo(cx + 20, cy - 305);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // Stepped Circuit Lines (Horizontal with Elbows)
      const drawStepLine = (y1, x_step, y2, x_final, nodeCol) => {
        ctx.strokeStyle = darkBorder;
        ctx.lineWidth = 16;
        ctx.beginPath();
        ctx.moveTo(cx + 20, y1);
        ctx.lineTo(cx + 20 + x_step, y1);
        ctx.lineTo(cx + 20 + x_step + 40, y2); // The diagonal step
        ctx.lineTo(cx + 20 + x_final, y2);
        ctx.stroke();

        // Node
        ctx.fillStyle = nodeCol;
        ctx.beginPath();
        ctx.arc(cx + 20 + x_final, y2, 28, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = darkBorder; ctx.lineWidth = 6;
        ctx.stroke();
      };

      // Y-coordinates and colors matching logo
      drawStepLine(cy - 220, 40, cy - 220, 150, '#FFD54F'); // Top Yellow
      drawStepLine(cy - 120, 60, cy - 120, 220, '#F06292'); // Pink Node (data)
      drawStepLine(cy - 30, 40, cy - 30, 190, '#FF8A65');  // Orange Node
      drawStepLine(cy + 60, 50, cy + 60, 230, '#81C784');  // Green Node
      drawStepLine(cy + 160, 30, cy + 160, 170, '#FFD54F'); // Bottom Yellow

      // Text "CIENCIA DE DATOS"
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.font = 'bold 120px Inter, Montserrat, sans-serif';
      ctx.fillText('CIENCIA', cx, cy + 460);
      ctx.font = 'bold 90px Inter, Montserrat, sans-serif';
      ctx.fillText('DE DATOS', cx, cy + 580);

      // Muestreo
      const imageData = ctx.getImageData(0, 0, W, H).data;
      const points = [];
      const colors = [];
      for (let y = 0; y < H; y += 2) {
        for (let x = 0; x < W; x += 2) {
          const idx = (y * W + x) * 4;
          if (imageData[idx + 3] > 128) {
            points.push([x, y]);
            colors.push([imageData[idx] / 255, imageData[idx + 1] / 255, imageData[idx + 2] / 255]);
          }
        }
      }

      const result = [];
      for (let i = 0; i < count; i++) {
        const idx = Math.floor(Math.random() * points.length);
        const p = points[idx];
        const c = colors[idx];
        const scale = 6.8 / W; // Made smaller (Logo further away)
        result.push({
          pos: [(p[0] - W / 2) * scale, -(p[1] - H / 2) * scale - 0.2, (Math.random() - 0.5) * 0.05],
          col: c
        });
      }
      return result;
    }

    // ========== TEXT-TO-PARTICLES ENGINE ==========
    let welcomePositions = null; // cached positions for the welcome text

    function generateTextPositions(text, count) {
      const offCanvas = document.createElement('canvas');
      const W = 1024, H = 320;
      offCanvas.width = W;
      offCanvas.height = H;
      const ctx = offCanvas.getContext('2d');

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Split into lines
      const lines = text.split('\n');
      const fontSize = Math.min(48, W / (Math.max(...lines.map(l => l.length)) * 0.65));
      ctx.font = `bold ${fontSize}px Inter, Arial, sans-serif`;

      const lineHeight = fontSize * 1.4;
      const totalHeight = lines.length * lineHeight;
      const startY = (H - totalHeight) / 2 + lineHeight / 2;

      for (let li = 0; li < lines.length; li++) {
        ctx.fillText(lines[li], W / 2, startY + li * lineHeight);
      }

      // Sample pixels where text was drawn
      const imageData = ctx.getImageData(0, 0, W, H).data;
      const filledPixels = [];
      let minX = W, maxX = 0, minY = H, maxY = 0;

      for (let py = 0; py < H; py += 1) { // Finer sampling for 15k
        for (let px = 0; px < W; px += 1) {
          const idx = (py * W + px) * 4;
          if (imageData[idx] > 128) {
            filledPixels.push([px, py]);
            if (px < minX) minX = px;
            if (px > maxX) maxX = px;
            if (py < minY) minY = py;
            if (py > maxY) maxY = py;
          }
        }
      }

      // Calculate centroid of the text block for perfect centering
      const centerX = (minX + maxX) / 2;
      const centerY = (minY + maxY) / 2;
      const scale = 8.8 / W;

      const result = [];
      const textParticleCount = Math.floor(count * 0.75); // 75% for text
      const fireworkParticleCount = count - textParticleCount; // 25% for fireworks

      // Global metadata for animation loop: [type, burstIdx, vx, vy, vz]
      window.particleMetadata = new Float32Array(count * 5);

      // 1. GENERATE TEXT PARTICLES WITH GRADIENT & SPARKLES
      for (let i = 0; i < textParticleCount; i++) {
        if (filledPixels.length > 0) {
          const idx = Math.floor(Math.random() * filledPixels.length);
          const [px, py] = filledPixels[idx];

          const x = (px - centerX) * scale;
          const y = -(py - centerY) * scale * 1.5;
          const z = (Math.random() - 0.5) * 0.05;

          // Metadata [i*5]: 0=Text, 1=BurstIdx (NA), 2,3,4=NA
          window.particleMetadata[i * 5] = 0;

          // Color Gradient: Top Pink (#E91E63) to Bottom Blue (#00B0FF)
          const normY = (py - minY) / (maxY - minY);
          let col = [
            (1 - normY) * 0.91 + normY * 0.0,  // R
            (1 - normY) * 0.12 + normY * 0.69, // G
            (1 - normY) * 0.39 + normY * 1.0   // B
          ];

          // 12% Gold Sparkles
          if (Math.random() < 0.12) col = [1.0, 0.84, 0.31]; // Gold #FFD54F

          result.push({ pos: [x, y, z], col: col });
        }
      }

      // 2. GENERATE FIREWORKS EXPLOSIONS (Radial Clusters)
      const fireworkColors = [
        [0.29, 0.87, 0.50], // Green #4ade80
        [1.0, 0.84, 0.31],  // Gold #FFD54F
        [0.91, 0.12, 0.39], // Red #E91E63
        [0.0, 0.69, 1.0]    // Cyan #00B0FF
      ];

      const centers = [
        [-3.8, 1.8], [3.8, 1.8],   // Top corners
        [-4.5, 0.0], [4.5, 0.0],   // Middle sides
        [-3.6, -1.5], [3.6, -1.5]  // Bottom corners
      ];

      const particlesPerBurst = Math.floor(fireworkParticleCount / centers.length);
      let pIdx = textParticleCount;
      centers.forEach((center, cIdx) => {
        const burstCol = fireworkColors[cIdx % fireworkColors.length];
        for (let i = 0; i < particlesPerBurst; i++) {
          if (pIdx >= count) break;
          const r = Math.random() * 0.8;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.random() * Math.PI;

          const rx = r * Math.sin(phi) * Math.cos(theta);
          const ry = r * Math.sin(phi) * Math.sin(theta);
          const rz = r * Math.cos(phi);

          // Metadata: Type=1 (Firework), BurstIdx, Velocity(vX,vY,vZ)
          const mIdx = pIdx * 5;
          window.particleMetadata[mIdx] = 1;
          window.particleMetadata[mIdx + 1] = cIdx; // Burst index
          // High initial velocity for "explosion"
          window.particleMetadata[mIdx + 2] = (Math.random() - 0.5) * 4.5;
          window.particleMetadata[mIdx + 3] = (Math.random() - 0.1) * 5.0; // biased upward
          window.particleMetadata[mIdx + 4] = (Math.random() - 0.5) * 2.5;

          pIdx++;

          result.push({
            pos: [center[0], center[1], 0], // Start at center
            col: burstCol,
            fireworkCenter: center
          });
        }
      });

      return result;
    }

    // ========== SHAPE STATE ==========
    let currentShape = 'cloud';
    let gestureShape = null;      // shape triggered by gesture (overrides buttons)
    let lastGestureShape = 'cloud';  // to avoid re-setting targets every frame

    const shapeGenerators = {
      cloud: (count) => {
        const res = [];
        for (let i = 0; i < count; i++) res.push({ pos: [(Math.random() - 0.5) * 7, (Math.random() - 0.5) * 7, (Math.random() - 0.5) * 7], col: [0.65, 0.54, 0.98] });
        return res;
      },
      logo: generateLogoPositions,
      welcome: (count) => {
        return generateTextPositions(
          'BIENVENIDOS A LA DEMOSTRACION\nY PRESENTACION DE\nCIENCIA DE DATOS',
          count
        );
      }
    };

    function setTargets(shapeName) {
      if (shapeName === 'welcome') {
        welcomePositions = null; // regenerate for fresh randomization
      }
      const gen = shapeGenerators[shapeName];
      if (!gen) return;
      const data = gen(PARTICLE_COUNT);
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        targets[i3] = data[i].pos[0];
        targets[i3 + 1] = data[i].pos[1];
        targets[i3 + 2] = data[i].pos[2];

        targetColors[i3] = data[i].col[0];
        targetColors[i3 + 1] = data[i].col[1];
        targetColors[i3 + 2] = data[i].col[2];
      }
    }

    // Init positions randomly (cloud)
    // This part is now handled by the initial setup of positions and colors arrays
    setTargets('cloud'); // Set initial targets to cloud

    // ========== GESTURE STATE ==========
    let gestureFactor = 0;       // 0 = closed/no hand, 1 = fully open
    let smoothGesture = 0;       // smoothed value
    const GESTURE_SMOOTH = 0.08;

    // ========== HAND TRACKING STATE ==========
    let handX = 0.5, handY = 0.5;           // raw hand position (0-1, from camera)
    let handRotZ = 0;                        // raw hand rotation angle (radians)
    let smoothHandX = 0, smoothHandY = 0;    // smoothed position (mapped to 3D coords)
    let smoothHandRotZ = 0;                  // smoothed rotation
    let handDetected = false;
    const HAND_TRACK_SMOOTH = 0.07;          // smoothing factor for hand tracking
    const HAND_MOVE_RANGE = 3.5;             // max displacement in 3D units

    // ========== MEDIAPIPE HANDS ==========
    const videoEl = document.getElementById('cam-video');
    const overlayCanvas = document.getElementById('cam-overlay');
    const overlayCtx = overlayCanvas.getContext('2d');
    const gestureDot = document.getElementById('gesture-dot');
    const gestureText = document.getElementById('gesture-text');

    function calcOpenness(landmarks) {
      const wrist = landmarks[0];
      const tips = [4, 8, 12, 16, 20];
      const mids = [2, 5, 9, 13, 17];
      let openScore = 0;
      for (let j = 0; j < tips.length; j++) {
        const tip = landmarks[tips[j]];
        const mid = landmarks[mids[j]];
        const tipDist = Math.hypot(tip.x - wrist.x, tip.y - wrist.y, tip.z - wrist.z);
        const midDist = Math.hypot(mid.x - wrist.x, mid.y - wrist.y, mid.z - wrist.z);
        openScore += tipDist / (midDist + 0.001);
      }
      openScore /= tips.length;
      return Math.max(0, Math.min(1, (openScore - 1.2) / 1.0));
    }

    // ========== GESTURE DETECTION ==========
    function isFingerExtended(landmarks, tipIdx, pipIdx, mcpIdx) {
      // A finger is extended if the tip is farther from wrist than the PIP joint
      const wrist = landmarks[0];
      const tipDist = Math.hypot(
        landmarks[tipIdx].x - wrist.x,
        landmarks[tipIdx].y - wrist.y
      );
      const pipDist = Math.hypot(
        landmarks[pipIdx].x - wrist.x,
        landmarks[pipIdx].y - wrist.y
      );
      return tipDist > pipDist * 1.1;
    }

    function detectGesture(landmarks) {
      // Check each finger: [tip, pip, mcp]
      const index = isFingerExtended(landmarks, 8, 6, 5);
      const middle = isFingerExtended(landmarks, 12, 10, 9);
      const ring = isFingerExtended(landmarks, 16, 14, 13);
      const pinky = isFingerExtended(landmarks, 20, 18, 17);

      // ✌️ Peace: only index + middle extended
      if (index && middle && !ring && !pinky) return 'peace';

      // ☝️ Index Up: only index extended
      if (index && !middle && !ring && !pinky) return 'point';

      return null;
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.5,
    });

    hands.onResults((results) => {
      overlayCanvas.width = overlayCanvas.clientWidth;
      overlayCanvas.height = overlayCanvas.clientHeight;
      overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        handDetected = true;
        let bestGesture = null;
        let currentOpenness = 0;
        let navHandFound = false;
        let cmdHandFound = false;

        results.multiHandLandmarks.forEach((lm, index) => {
          const label = results.multiHandedness[index].label;

          // ROLE: NAVIGATION & ZOOM (Typically Left Hand)
          if (label === 'Left' || results.multiHandLandmarks.length === 1) {
            navHandFound = true;
            const open = calcOpenness(lm);
            currentOpenness = open;

            const palm = lm[9];
            handX = palm.x;
            handY = palm.y;
            const wrist = lm[0];
            const midBase = lm[9];
            handRotZ = Math.atan2(midBase.x - wrist.x, wrist.y - midBase.y);
          }

          // ROLE: GESTURES (Typically Right Hand)
          if (label === 'Right' || results.multiHandLandmarks.length === 1) {
            cmdHandFound = true;
            const g = detectGesture(lm);
            if (g) bestGesture = g;
          }

          // Draw landmarks
          overlayCtx.fillStyle = label === 'Left' ? 'rgba(74,222,128,0.7)' : 'rgba(255,48,107,0.7)';
          for (const p of lm) {
            overlayCtx.beginPath();
            overlayCtx.arc(p.x * overlayCanvas.width, p.y * overlayCanvas.height, 2, 0, Math.PI * 2);
            overlayCtx.fill();
          }
        });

        gestureFactor = currentOpenness;

        // --- Apply Special Gesture Shape ---
        if (bestGesture === 'peace') {
          gestureShape = 'welcome';
          // Force scale ONLY if we don't have a dedicated navigation hand for zoom
          if (!navHandFound && gestureFactor < 0.8) gestureFactor = 1.6;
          gestureDot.className = 'open';
          gestureText.textContent = '✌️ Right Hand [Peace] — Welcome';
          gestureText.style.background = 'rgba(255, 48, 107, 0.4)';
        } else if (bestGesture === 'point') {
          gestureShape = 'logo';
          if (!navHandFound && gestureFactor < 0.8) gestureFactor = 1.6;
          gestureDot.className = 'open';
          gestureText.style.background = 'rgba(0, 154, 205, 0.4)';
          gestureText.textContent = '☝️ Right Hand [Index] — Identity';
        } else if (currentOpenness > 0.5) {
          gestureShape = null;
          gestureDot.className = 'open';
          gestureText.style.background = 'rgba(74, 222, 128, 0.2)';
          gestureText.textContent = 'Left Hand [Open] — Zoom Libre';
        } else {
          gestureShape = null;
          gestureDot.className = 'closed';
          gestureText.style.background = 'rgba(74, 222, 128, 0.2)';
          gestureText.textContent = 'Left Hand [Closed] — Fixed Position';
        }
      } else {
        gestureFactor = 0;
        handDetected = false;
        gestureShape = null;
        gestureDot.className = '';
        gestureText.textContent = 'Waiting for hand…';
      }
    });

    // Start camera
    let isCamRunning = true;
    const camUtil = new Camera(videoEl, {
      onFrame: async () => {
        if (isCamRunning) {
          await hands.send({ image: videoEl });
        }
      },
      width: 320,
      height: 240,
    });
    camUtil.start();

    document.getElementById('cam-toggle-btn').addEventListener('click', (e) => {
      isCamRunning = !isCamRunning;
      const wrapper = document.getElementById('cam-wrapper');
      const btn = e.target;

      if (isCamRunning) {
        btn.textContent = 'Apagar Cámara';
        wrapper.classList.remove('off');
        camUtil.start();
      } else {
        btn.textContent = 'Encender Cámara';
        wrapper.classList.add('off');
        camUtil.stop();
        // Reset hand state
        handDetected = false;
        gestureShape = null;
        gestureDot.className = '';
        gestureText.textContent = 'Cámara apagada';
      }
    });

    // ========== MOUSE ORBIT ==========
    let mouseX = 0, mouseY = 0;
    let rotX = 0, rotY = 0;
    let isDragging = false;

    canvas.addEventListener('pointerdown', () => isDragging = true);
    window.addEventListener('pointerup', () => isDragging = false);
    canvas.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      mouseX += e.movementX * 0.003;
      mouseY += e.movementY * 0.003;
      mouseY = Math.max(-1.2, Math.min(1.2, mouseY));
    });

    // ========== ANIMATION LOOP ==========
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      // --- Gesture-driven shape switching ---
      let activeShape = currentShape;
      if (gestureShape) {
        activeShape = gestureShape;
      } else if (!handDetected) {
        activeShape = 'cloud';
      }
      if (activeShape !== lastGestureShape) {
        setTargets(activeShape);
        lastGestureShape = activeShape;
        // Update button highlight
        document.querySelectorAll('.shape-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.shape === activeShape);
        });
      }

      // Smooth gesture
      smoothGesture += (gestureFactor - smoothGesture) * GESTURE_SMOOTH;

      // --- Smooth hand tracking ---
      const isLogo = (lastGestureShape === 'logo');
      const moveInertia = isLogo ? 0.04 : HAND_TRACK_SMOOTH;

      if (handDetected) {
        // Map camera coords to 3D space (mirror X so moving hand right moves figure right)
        const targetX = -(handX - 0.5) * HAND_MOVE_RANGE * 2;
        const targetY = -(handY - 0.5) * HAND_MOVE_RANGE * 2;
        smoothHandX += (targetX - smoothHandX) * moveInertia;
        smoothHandY += (targetY - smoothHandY) * moveInertia;
        smoothHandRotZ += (handRotZ - smoothHandRotZ) * moveInertia;
      } else {
        // Smoothly return to center when no hand detected
        smoothHandX += (0 - smoothHandX) * moveInertia * 0.5;
        smoothHandY += (0 - smoothHandY) * moveInertia * 0.5;
        smoothHandRotZ += (0 - smoothHandRotZ) * moveInertia * 0.5;
      }

      // Expansion factor: when hand is open particles expand outward
      const expansionScale = 1.0 + smoothGesture * 2.5;

      // Add auto-rotation (with toggle)
      if (autoRotate) {
        if (isLogo) rotX += 0.012;
        else rotX += 0.005;
      }

      // Lerp particles toward targets (with expansion)
      const pos = geometry.attributes.position.array;
      const col = geometry.attributes.color.array;
      const t = clock.elapsedTime;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        let tx = targets[i3] * expansionScale;
        let ty = targets[i3 + 1] * expansionScale;
        let tz = targets[i3 + 2] * expansionScale;
        let tr = targetColors[i3];
        let tg = targetColors[i3 + 1];
        let tb = targetColors[i3 + 2];

        // v5.3 DYNAMIC EFFECTS: Color Wave & Kinematic Fireworks
        const isWelcome = (lastGestureShape === 'welcome');
        if (isWelcome && window.particleMetadata && window.particleMetadata.length > i * 5) {
          const mIdx = i * 5;
          const type = window.particleMetadata[mIdx];
          
          if (type === 0) {
            // v5.3: SMOOTH COLOR CYCLE for text
            const hueShift = Math.sin(t * 1.2 + ty * 0.5) * 0.2;
            tr = Math.max(0, Math.min(1, tr + hueShift));
            tb = Math.max(0, Math.min(1, tb - hueShift));
          } else if (type === 1) {
            // v5.3: KINEMATIC FIREWORKS (Explode -> Gravity -> Fade)
            const burstIdx = window.particleMetadata[mIdx + 1];
            const vx = window.particleMetadata[mIdx + 2];
            const vy = window.particleMetadata[mIdx + 3];
            const vz = window.particleMetadata[mIdx + 4];

            // Life cycle: 3.5 second loop per burst center
            const life = (t + burstIdx * 0.6) % 3.5; 
            const age = life;
            
            if (age < 3.0) {
              // Kinematics: pos = p0 + v*t - 0.5*g*t^2
              const gravity = 2.2;
              const drag = Math.pow(0.5, age); // air friction
              tx = tx + vx * age * drag;
              ty = ty + vy * age * drag - 0.5 * gravity * age * age;
              tz = tz + vz * age * drag;

              // Fade to black: starts fading at 1.2s
              if (age > 1.2) {
                const fade = 1.0 - Math.min(1, (age - 1.2) / 1.5);
                tr *= fade; tg *= fade; tb *= fade;
              }
            } else {
              // Particle is "invisible" (black) while resetting
              tr = tg = tb = 0;
            }
          }
        }

        pos[i3] += (tx - pos[i3]) * LERP_SPEED;
        pos[i3 + 1] += (ty - pos[i3 + 1]) * LERP_SPEED;
        pos[i3 + 2] += (tz - pos[i3 + 2]) * LERP_SPEED;

        // Color lerp
        col[i3] += (tr - col[i3]) * LERP_SPEED;
        col[i3 + 1] += (tg - col[i3 + 1]) * LERP_SPEED;
        col[i3 + 2] += (tb - col[i3 + 2]) * LERP_SPEED;
      }
      geometry.attributes.position.needsUpdate = true;
      geometry.attributes.color.needsUpdate = true;

      // Slow auto-rotate + mouse orbit (disabled for text shapes)
      const isTextShape = (lastGestureShape === 'welcome');
      rotX += (mouseX - rotX) * 0.05;
      rotY += (mouseY - rotY) * 0.05;

      if (isTextShape) {
        // Keep text face-on: no auto-rotation, gentle hand influence only
        points.rotation.y = rotX * 0.2;
        points.rotation.x = rotY * 0.2;
        points.rotation.z = 0;
      } else {
        points.rotation.y = (autoRotate ? t * 0.12 : 0) + rotX;
        points.rotation.x = rotY;
        points.rotation.z = smoothHandRotZ;
      }

      // Hand position controls figure translation
      points.position.x = smoothHandX;
      points.position.y = smoothHandY;

      // Particle size responds to gesture
      material.size = 0.025 + smoothGesture * 0.025;
      renderer.render(scene, camera3D);
    }
    animate();

    // ========== UI INTERACTIONS ==========

    // Shape buttons
    document.querySelectorAll('.shape-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentShape = btn.dataset.shape;
        setTargets(currentShape);
      });
    });

    // Color picker
    document.getElementById('color-picker').addEventListener('input', (e) => {
      const hex = e.target.value;
      const c = new THREE.Color(hex);
      defaultColor.set(hex);
      // For shapes that don't have their own color scheme, update target colors
      if (currentShape !== 'logo' && currentShape !== 'welcome') {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const i3 = i * 3;
          targetColors[i3] = c.r;
          targetColors[i3 + 1] = c.g;
          targetColors[i3 + 2] = c.b;
        }
      }
    });

    // Rotation Toggle
    document.getElementById('rotate-toggle-btn').addEventListener('click', (e) => {
      autoRotate = !autoRotate;
      e.target.textContent = autoRotate ? '⏸ Pausar Giro' : '▶️ Reanudar Giro';
    });

    // Fullscreen
    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    // Handle resize
    window.addEventListener('resize', () => {
      camera3D.aspect = window.innerWidth / window.innerHeight;
      camera3D.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>

</html>
